<html lang="ca">
<head>
    <meta charset="utf-8">
    <title>Donar la volta a una carta - Dinàmic</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/p100-memoria.js"></script>
</head>
<body>
<header>
    <h1>Memòria cartes</h1>
    
    <div id="controls" style="margin-bottom: 20px;">
        <label for="nivell">Tria la mida del tauler: </label>
        <select id="nivell">
            <option value="2x2">Molt Fàcil (2 files x 2 col - 4 cartes)</option>
            <option value="4x4" selected>Normal (4 files x 4 col - 16 cartes)</option>
            <option value="4x6">Difícil (4 files x 6 col - 24 cartes)</option>
        </select>
        <button id="btn-iniciar">Generar Joc</button>
    </div>
</header>

<div id="tauler"></div>

<footer>
    <p>Fes clic en una carta per donar-li la volta</p>
</footer>
</body>
</html>
